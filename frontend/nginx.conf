# Copied into the image at /etc/nginx/templates/default.conf.template by
# frontend/Dockerfile. The official nginx image's entrypoint runs this
# through envsubst at container start, substituting ${API_INTERNAL_HOST}
# from the environment before writing it to /etc/nginx/conf.d/default.conf
# — that's how the backend's address (a Railway private-network hostname
# that isn't known until deploy time) gets into a file baked at build time.
# Set API_INTERNAL_HOST as a variable on the frontend Railway service, e.g.
# API_INTERNAL_HOST=${{api.RAILWAY_PRIVATE_DOMAIN}} (see README).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to the FastAPI service over Railway's private network.
    # The trailing slash on proxy_pass strips the /api/ prefix, so a
    # request to /api/sync/123 reaches the backend as /sync/123 — the API's
    # routes are mounted at root, with no /api prefix of their own.
    location /api/ {
        proxy_pass http://${API_INTERNAL_HOST}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # Serve the React build; fall back to index.html for any path that
    # isn't a real static file, so e.g. /connected?realm_id=... (the OAuth
    # callback redirect target) still loads the app instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
